name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build single-exe (no bundle)
        run: npm run tauri -- build --no-bundle --target x86_64-pc-windows-msvc

      - name: Rename executable
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $src = "src-tauri/target/x86_64-pc-windows-msvc/release/TodoApp.exe"
          $dst = "TodoApp-$version.exe"
          if (-not (Test-Path $src)) {
            Write-Error "Build artifact not found at $src"
            exit 1
          }
          Copy-Item $src $dst
          Write-Host "Prepared $dst"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'TodoApp ${{ github.ref_name }}'
          body: 'Veja os commits desta versão para detalhes.'
          draft: false
          prerelease: false
          files: TodoApp-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
