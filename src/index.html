<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODOCompanion</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./updater/updater.css" />
  </head>
  <body>
    <div id="app" class="collapsed">
      <button class="edge-toggle" id="edgeToggle" type="button" aria-label="Abrir painel">
        <svg class="edge-symbol" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6 9 12l6 6" />
        </svg>
      </button>

      <section class="panel" aria-label="TODOCompanion">
        <header class="topbar" data-tauri-drag-region>
          <div class="brand" data-tauri-drag-region>
            <span class="brand-mark" aria-hidden="true"></span>
            <span class="brand-copy" data-tauri-drag-region>
              <strong>TODOCompanion</strong>
              <small>Mapa de tarefas</small>
            </span>
          </div>
          <div class="topbar-actions">
            <button class="topbar-action" id="maximizeAppButton" type="button" aria-label="Maximizar" title="Maximizar">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 14v6h6M20 10V4h-6M20 4l-7 7M4 20l7-7" />
              </svg>
            </button>
            <button class="topbar-action" id="openSettingsButton" type="button" aria-label="Configurações" title="Configurações">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="3" />
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
              </svg>
            </button>
            <button class="topbar-action topbar-close" id="closeAppButton" type="button" aria-label="Fechar" title="Fechar aplicativo">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 6 6 18M6 6l12 12" />
              </svg>
            </button>
          </div>
        </header>

        <nav class="tabs-row">
          <div class="tabs" id="tabs"></div>
          <div class="view-switch" id="viewSwitch" role="group" aria-label="Modo de visualizacao">
            <button type="button" data-view-mode="list">Lista</button>
            <button type="button" data-view-mode="canvas">Canva</button>
          </div>
          <button class="tab-add" id="addBoardButton" type="button" aria-label="Novo usuario" title="Novo usuario">+</button>
        </nav>

        <main class="board-shell">
          <div class="canvas-meta-overlay" id="canvasMetaOverlay" aria-label="Detalhes da main task">
            <label>
              <span>Inicio</span>
              <input id="overlayStartInput" type="date" />
            </label>
            <label>
              <span>Fim</span>
              <input id="overlayEndInput" type="date" />
            </label>
            <label>
              <span>Status</span>
              <select id="overlayStatusInput">
                <option value="ongoing">Ongoing</option>
                <option value="stopped">Stopped</option>
                <option value="complete">Complete</option>
              </select>
            </label>
            <label class="overlay-criticality-field">
              <span>Criticidade</span>
              <div class="overlay-criticality crit-0" id="overlayCriticalityControl">
                <div class="crit-track">
                  <span class="crit-dot"></span>
                  <span class="crit-dot"></span>
                  <span class="crit-dot"></span>
                </div>
                <input id="overlayCriticalityInput" type="range" min="0" max="2" step="1" value="0" aria-label="Criticidade" />
              </div>
            </label>
          </div>
          <div class="board-surface" id="boardSurface">
            <svg class="link-layer" id="linkLayer" aria-hidden="true"></svg>
            <div class="nodes-layer" id="nodesLayer"></div>
          </div>
          <button class="canvas-center-button" id="centerCanvasButton" type="button" aria-label="Centralizar tasks" title="Centralizar tasks"></button>
          <button class="canvas-organize-button" id="organizeCanvasButton" type="button" aria-label="Organizar cards" title="Organizar cards"></button>
          <button class="canvas-attach-button" id="canvasAttachButton" type="button" aria-label="Anexar arquivo" title="Anexar arquivo"></button>
          <input class="canvas-attach-input" id="canvasAttachInput" type="file" multiple hidden />
          <div class="attachments-popup" id="attachmentsPopup" hidden>
            <div class="attachments-list" id="attachmentsList"></div>
            <button class="attachments-add" id="attachmentsAdd" type="button">+ Adicionar anexo</button>
          </div>
          <div class="canvas-drop-overlay" id="canvasDropOverlay" hidden>
            <div class="canvas-drop-inner">
              <svg viewBox="0 0 24 24" width="38" height="38" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              <span>Solte para anexar</span>
            </div>
          </div>
          <section class="action-list-shell" id="actionListShell" hidden>
            <svg class="action-list-links" id="actionListLinks" aria-hidden="true"></svg>
            <div class="action-list" id="actionList"></div>
          </section>
        </main>

        <section class="user-task-dock" aria-label="Tasks por usuario">
          <button class="dock-scroll dock-scroll-left" id="dockScrollLeft" type="button" aria-label="Rolar tasks para esquerda" title="Rolar para esquerda" hidden></button>
          <div class="user-task-list" id="userTaskList"></div>
          <button class="dock-scroll dock-scroll-right" id="dockScrollRight" type="button" aria-label="Rolar tasks para direita" title="Rolar para direita" hidden></button>
          <button class="dock-add" id="addUserTaskButton" type="button" aria-label="Nova main task" title="Nova main task">+</button>
        </section>

      </section>

      <form class="task-edit-popup" id="taskEditPopup" hidden>
        <label>
          <span>Task</span>
          <input id="tepNameInput" type="text" autocomplete="off" required />
        </label>
        <div class="tep-grid">
          <label>
            <span>Inicio</span>
            <input id="tepStartInput" type="date" />
          </label>
          <label>
            <span>Fim</span>
            <input id="tepEndInput" type="date" />
          </label>
        </div>
        <div class="tep-grid">
          <label>
            <span>Prioridade</span>
            <select id="tepPriorityInput">
              <option value="low">Baixa</option>
              <option value="normal">Normal</option>
              <option value="high">Alta</option>
              <option value="urgent">Urgente</option>
            </select>
          </label>
          <label>
            <span>Status</span>
            <select id="tepStatusInput">
              <option value="ongoing">Ongoing</option>
              <option value="stopped">Stopped</option>
              <option value="complete">Complete</option>
            </select>
          </label>
        </div>
        <div class="tep-footer">
          <button class="modal-button secondary" type="button" id="tepCancelButton">Cancelar</button>
          <button class="modal-button primary" type="submit">Salvar</button>
        </div>
      </form>

      <form class="new-card-popup" id="newCardForm" hidden>
        <input id="newCardTitleInput" type="text" placeholder="Titulo do card" autocomplete="off" required />
        <select id="newCardStatusInput">
          <option value="ongoing">Ongoing</option>
          <option value="stopped">Stopped</option>
          <option value="complete">Complete</option>
        </select>
        <div class="new-card-popup-footer">
          <button class="modal-button secondary" id="newCardCancelButton" type="button">Cancelar</button>
          <button class="modal-button primary" type="submit">Criar</button>
        </div>
      </form>

      <form class="user-create-popup" id="userCreateForm" hidden>
        <label>
          <span>Nome</span>
          <input id="userCreateNameInput" type="text" autocomplete="off" required />
        </label>
        <div class="user-create-popup-footer">
          <button class="modal-button secondary" id="userCreateCancelButton" type="button">Cancelar</button>
          <button class="modal-button primary" type="submit">Criar</button>
        </div>
      </form>

      <div class="modal-backdrop" id="settingsModal" hidden>
        <div class="canvas-modal settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
          <header>
            <strong id="settingsModalTitle">Configurações</strong>
            <button class="modal-icon" id="settingsCloseIcon" type="button" aria-label="Fechar" title="Fechar">x</button>
          </header>
          <div class="settings-row">
            <span class="settings-label">Versão</span>
            <span class="settings-value" id="settingsVersionValue">—</span>
          </div>
          <label class="settings-row settings-toggle">
            <span class="settings-label">Iniciar com o Windows</span>
            <input type="checkbox" id="settingsAutostartInput" />
            <span class="settings-switch" aria-hidden="true"></span>
          </label>
          <footer>
            <button class="modal-button secondary" id="settingsDoneButton" type="button">Fechar</button>
          </footer>
        </div>
      </div>

      <div class="modal-backdrop" id="confirmDeleteModal" hidden>
        <form class="canvas-modal confirm-modal" id="confirmDeleteForm">
          <header>
            <strong id="confirmDeleteTitle">Excluir</strong>
          </header>
          <p class="confirm-text" id="confirmDeleteMessage">Esta acao nao pode ser desfeita.</p>
          <label>
            <span>Para confirmar, digite <code class="confirm-code" id="confirmDeleteCode">XYZ</code></span>
            <input id="confirmDeleteInput" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" maxlength="3" />
          </label>
          <footer>
            <button class="modal-button secondary" id="confirmDeleteCancel" type="button">Cancelar</button>
            <button class="modal-button primary" id="confirmDeleteOk" type="submit" disabled>Excluir</button>
          </footer>
        </form>
      </div>

      <div class="modal-backdrop" id="canvasModal" hidden>
        <form class="canvas-modal" id="canvasForm">
          <header>
            <strong id="canvasModalTitle">Novo canvas</strong>
            <button class="modal-icon" id="canvasCancelIcon" type="button" aria-label="Fechar" title="Fechar">x</button>
          </header>
          <label class="modal-owner-field">
            <span id="canvasOwnerLabel">Usuario</span>
            <input id="canvasOwnerInput" type="text" autocomplete="off" />
          </label>
          <label class="modal-task-field">
            <span>Task</span>
            <input id="canvasNameInput" type="text" autocomplete="off" required />
          </label>
          <div class="modal-grid modal-task-options">
            <label>
              <span>Inicio</span>
              <input id="canvasStartInput" type="date" />
            </label>
            <label>
              <span>Fim</span>
              <input id="canvasEndInput" type="date" />
            </label>
          </div>
          <div class="modal-grid modal-task-options">
            <label>
              <span>Prioridade</span>
              <select id="canvasPriorityInput">
                <option value="low">Baixa</option>
                <option value="normal">Normal</option>
                <option value="high">Alta</option>
                <option value="urgent">Urgente</option>
              </select>
            </label>
            <label>
              <span>Status</span>
              <select id="canvasStatusInput">
                <option value="ongoing">Ongoing</option>
                <option value="stopped">Stopped</option>
                <option value="complete">Complete</option>
              </select>
            </label>
          </div>
          <footer>
            <button class="modal-button secondary" id="canvasCancelButton" type="button">Cancelar</button>
            <button class="modal-button primary" type="submit">Salvar</button>
          </footer>
        </form>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
